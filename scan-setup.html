<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignalStack | Connect Google</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <div class="app">
      <header class="site-header">
        <a class="brand" href="index.html" aria-label="SignalStack home">
          <img src="img/logo.svg" alt="SignalStack logo" />
        </a>
        <nav class="site-nav" aria-label="Main navigation">
          <a class="nav-link" href="index.html">Overview</a>
          <a class="nav-link" href="results.html">Preview app</a>
        </nav>
      </header>

      <main class="onboarding-page fade-up">
        <section class="auth-shell">
          <div class="auth-copy">
            <p class="eyebrow">Step 1 of 3</p>
            <h1 class="page-title">Life alert for your brand</h1>
            <p class="lede">Start with a simple Google sign in, then confirm the brand details we found.</p>
          </div>

          <form id="google-auth-form" action="scan-competitors.html" class="auth-card">
            <button class="button oauth-submit" type="submit">
              <span class="google-mark" aria-hidden="true">G</span>
              Continue with Google
            </button>

            <div class="auth-divider">Choose a demo workspace</div>

            <div class="account-picker" role="radiogroup" aria-label="Mock Google accounts">
              <label class="account-option">
                <input type="radio" name="mock-account" value="figma" checked />
                <span>Figma Design Team</span>
              </label>
              <label class="account-option">
                <input type="radio" name="mock-account" value="notion" />
                <span>Notion Growth</span>
              </label>
              <label class="account-option">
                <input type="radio" name="mock-account" value="loom" />
                <span>Loom Marketing</span>
              </label>
            </div>
          </form>

          <p class="terms-copy">
            By continuing you agree to the <a href="index.html">Terms</a> &amp; <a href="index.html">Privacy Policy</a>.
          </p>
        </section>
      </main>
    </div>

    <script src="main.js"></script>
  </body>
</html>
