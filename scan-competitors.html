<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignalStack | Confirm Brand Details</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <div class="app">
      <header class="site-header">
        <a class="brand" href="index.html" aria-label="SignalStack home">
          <img src="img/logo.svg" alt="SignalStack logo" />
        </a>
        <nav class="site-nav" aria-label="Main navigation">
          <a class="nav-link" href="scan-setup.html">Back</a>
        </nav>
      </header>

      <main class="onboarding-page fade-up">
        <section class="auth-shell narrow">
          <div class="auth-copy">
            <p class="eyebrow">Step 2 of 3</p>
            <h1 class="page-title">Confirm your brand details</h1>
            <p class="lede">Keep this part minimal for now: brand name, website, and the competitors we should benchmark against.</p>
          </div>

          <form id="competitor-form" action="scan-loading.html" class="confirmation-card">
            <div class="confirmation-grid">
              <label class="field">
                <span>Is this your brand name?</span>
                <input id="company-name" name="company" type="text" placeholder="Figma" required />
              </label>
              <label class="field">
                <span>Is this your website?</span>
                <input id="company-url" name="url" type="text" placeholder="https://www.figma.com" required />
              </label>
              <label class="field">
                <span>Who are your main competitors?</span>
                <input class="competitor-input" type="text" placeholder="Canva" required />
              </label>
              <label class="field">
                <span>Competitor 2</span>
                <input class="competitor-input" type="text" placeholder="Adobe XD" required />
              </label>
              <label class="field">
                <span>Competitor 3</span>
                <input class="competitor-input" type="text" placeholder="Sketch" required />
              </label>
              <label class="field">
                <span>Competitor 4</span>
                <input class="competitor-input" type="text" placeholder="Framer" />
              </label>
            </div>

            <div class="footer-actions">
              <a class="button" href="scan-setup.html">Back</a>
              <button class="button primary" type="submit">Build dashboard</button>
            </div>
          </form>
        </section>
      </main>
    </div>

    <script src="main.js"></script>
  </body>
</html>
