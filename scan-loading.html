<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignalStack | Building Benchmark</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <div class="app">
      <header class="site-header">
        <a class="brand" href="index.html" aria-label="SignalStack home">
          <img src="img/logo.svg" alt="SignalStack logo" />
        </a>
        <nav class="site-nav" aria-label="Main navigation">
          <a class="nav-link" href="scan-competitors.html">Edit Inputs</a>
        </nav>
      </header>

      <main class="loading-page fade-up">
        <section class="loading-shell">
          <div class="auth-copy">
            <p class="eyebrow">Step 3 of 3</p>
            <h1 class="page-title">Building your dashboard</h1>
            <p class="lede">Pulling together a lightweight brand benchmark for <span data-company>your company</span>.</p>
          </div>

          <div class="confirmation-card">
            <div class="progress-shell">
              <div class="progress-track">
                <span id="progress-bar"></span>
              </div>
              <div class="progress-meta">
                <strong id="progress-text">Initializing competitor profile</strong>
                <span id="progress-percent">0%</span>
              </div>
            </div>

            <div class="loading-timeline" id="loading-timeline"></div>

            <div class="button-row">
              <a class="button" href="scan-competitors.html">Back</a>
              <a class="button primary is-hidden" id="view-results" href="results.html">Open dashboard</a>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="main.js"></script>
  </body>
</html>
