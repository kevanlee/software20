<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignalStack | Brand Health Command Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="home.css" />

  </head>
  <body>
    <div class="page">
      <div class="top-shell">
        <!-- <div class="announcement-bar">
          <p>
            We're proud to announce our $25M Series A to fund more brand health research. <a href="">Learn more &rarr;</a>
          </p>
        </div> -->
        <div class="main-nav">
            <div class="main-nav-container">
            <div class="main-nav-logo">
                <a href="index.html">
                    <img src="img/logo.svg" alt="SignalStack logo" />
                </a>
            </div>
            <div class="main-nav-actions">
                <button class="button">Get started</button>
                    <button class="button">Log in</button>
                </div>
            </div>
        </div>
        </div>
        <div class="main-content signup">
            <section class="oauth">
                <h3>
                    Set up your dashboard
                </h3>
                <div class="setup-fields">
                    <form id="setup-form" class="setup-form" action="loading.html">
                        <div class="setup-field">
                            <label for="company-pill-input">Company name</label>
                            <div class="pill-field" id="company-pill-field" data-field="company"></div>
                        </div>

                        <div class="setup-field">
                            <label for="website-pill-input">Company website</label>
                            <div class="pill-field" id="website-pill-field" data-field="website"></div>
                        </div>

                        <div class="setup-field">
                            <div class="field-header">Main competitors</div>
                            <p class="field-help">Add your top 3 competitors.</p>
                            <div class="competitor-grid">
                                <div>
                                    <div class="pill-field" id="competitor-1-pill-field" data-field="competitor-1"></div>
                                </div>
                                <div>
                                    <div class="pill-field" id="competitor-2-pill-field" data-field="competitor-2"></div>
                                </div>
                                <div>
                                    <div class="pill-field" id="competitor-3-pill-field" data-field="competitor-3"></div>
                                </div>
                            </div>
                        </div>

                        <button class="submit-button" id="build-dashboard" type="submit" disabled>Build My Dashboard</button>
                    </form>
                </div>

            </section>
            <section class="sidebar">

            </section>

        </div>
        <div class="footer">
            <p>© 2026 SignalStack. All rights reserved.</p>
        </div>
    </div>
    <script>
      (function () {
        const STORAGE_KEY = "signalstack_benchmark";
        const defaultState = {
          company: "Figma",
          url: "https://www.figma.com",
          category: "AI-inferred category pending",
          persona: "AI-assisted onboarding",
          notes: "SignalStack will infer category, positioning, and brand context from the confirmed brand and website in a future iteration.",
          competitors: ["Canva", "Adobe XD", "Sketch", "Framer"],
          authProvider: "Google",
          authEmail: "hello@figma.com",
        };

        function loadState() {
          try {
            return { ...defaultState, ...(JSON.parse(window.localStorage.getItem(STORAGE_KEY)) || {}) };
          } catch (error) {
            return { ...defaultState };
          }
        }

        function saveState(nextState) {
          window.localStorage.setItem(STORAGE_KEY, JSON.stringify(nextState));
        }

        function normalizeUrl(raw) {
          const trimmed = raw.trim();
          if (!trimmed) return defaultState.url;
          if (/^https?:\/\//i.test(trimmed)) return trimmed;
          return `https://${trimmed}`;
        }

        function shortUrl(url) {
          return url.replace(/^https?:\/\//i, "").replace(/\/$/, "");
        }

        function createPill(text, onEdit, onRemove) {
          const pill = document.createElement("div");
          pill.className = "pill";

          const label = document.createElement("span");
          label.className = "pill-label";
          label.textContent = text;
          label.addEventListener("click", onEdit);

          const removeButton = document.createElement("button");
          removeButton.type = "button";
          removeButton.className = "pill-remove";
          removeButton.setAttribute("aria-label", `Clear ${text}`);
          removeButton.textContent = "x";
          removeButton.addEventListener("click", onRemove);

          pill.appendChild(label);
          pill.appendChild(removeButton);

          return pill;
        }

        function createSingleField(container, inputId, placeholder, initialValue, onChange) {
          let value = initialValue ? initialValue.trim() : "";
          const input = document.createElement("input");
          input.type = "text";
          input.id = inputId;
          input.className = "pill-input";
          input.placeholder = placeholder;

          function startEditing(nextValue) {
            value = "";
            input.value = nextValue || "";
            render();
            window.requestAnimationFrame(function () {
              input.focus();
              input.setSelectionRange(input.value.length, input.value.length);
            });
            onChange(value);
          }

          function commit() {
            const nextValue = input.value.trim();
            if (!nextValue) {
              value = "";
            } else {
              value = nextValue;
            }
            render();
            onChange(value);
          }

          function render() {
            container.innerHTML = "";
            if (value) {
              container.appendChild(
                createPill(
                  value,
                  function () {
                    startEditing(value);
                  },
                  function () {
                    startEditing("");
                  }
                )
              );
            }
            input.hidden = Boolean(value);
            container.appendChild(input);
            if (!value) {
              input.placeholder = placeholder;
            }
          }

          input.addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
              event.preventDefault();
              commit();
            }
          });

          input.addEventListener("blur", commit);
          render();
          onChange(value);

          return {
            getValue: function () {
              return value.trim();
            },
          };
        }

        const setupForm = document.getElementById("setup-form");
        const submitButton = document.getElementById("build-dashboard");
        const state = loadState();
        const formState = {
          company: state.company || "",
          website: shortUrl(state.url || ""),
          competitors: [
            Array.isArray(state.competitors) ? state.competitors[0] || "" : "",
            Array.isArray(state.competitors) ? state.competitors[1] || "" : "",
            Array.isArray(state.competitors) ? state.competitors[2] || "" : "",
          ],
        };

        function updateSubmitState() {
          const ready = Boolean(formState.company.trim()) && Boolean(formState.website.trim()) && formState.competitors.every(function (value) {
            return Boolean((value || "").trim());
          }) && formState.competitors.length === 3;
          submitButton.disabled = !ready;
          submitButton.classList.toggle("is-ready", ready);
        }

        if (setupForm && submitButton) {
          const companyField = createSingleField(
            document.getElementById("company-pill-field"),
            "company-pill-input",
            "Type your company name",
            formState.company,
            function (value) {
              formState.company = value;
              updateSubmitState();
            }
          );

          const websiteField = createSingleField(
            document.getElementById("website-pill-field"),
            "website-pill-input",
            "Type your website",
            formState.website,
            function (value) {
              formState.website = value;
              updateSubmitState();
            }
          );

          const competitorFields = [0, 1, 2].map(function (index) {
            return createSingleField(
              document.getElementById(`competitor-${index + 1}-pill-field`),
              `competitor-${index + 1}-pill-input`,
              `Type competitor ${index + 1}`,
              formState.competitors[index] || "",
              function (value) {
                formState.competitors[index] = value;
                updateSubmitState();
              }
            );
          });

          setupForm.addEventListener("submit", function (event) {
            event.preventDefault();
            updateSubmitState();

            if (submitButton.disabled) {
              return;
            }

            saveState({
              ...state,
              company: companyField.getValue() || state.company,
              url: normalizeUrl(websiteField.getValue()),
              competitors: competitorFields.map(function (field) {
                return field.getValue();
              }).filter(Boolean),
            });

            window.location.href = setupForm.action;
          });

          updateSubmitState();
        }

        const root = document.documentElement;
        const announcementBar = document.querySelector(".announcement-bar");

        if (!announcementBar) return;

        let ticking = false;
        let maxScroll = Math.max(announcementBar.offsetHeight, 1);

        const updateScrollState = () => {
          ticking = false;

          const scrollTop = window.scrollY || window.pageYOffset || 0;
          const progress = Math.min(scrollTop / maxScroll, 1);

          root.style.setProperty("--announcement-progress", progress.toFixed(3));
          document.body.classList.toggle("is-scrolled", progress > 0.02);
        };

        const requestUpdate = () => {
          if (ticking) return;
          ticking = true;
          window.requestAnimationFrame(updateScrollState);
        };

        const refreshMeasurements = () => {
          maxScroll = Math.max(announcementBar.offsetHeight, 1);
          requestUpdate();
        };

        window.addEventListener("scroll", requestUpdate, { passive: true });
        window.addEventListener("resize", refreshMeasurements);
        window.addEventListener("load", refreshMeasurements);

        refreshMeasurements();
      })();
    </script>
  </body>
</html>
