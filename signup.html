    <script>
      (function () {
        const STORAGE_KEY = "signalstack_benchmark";
        const defaultState = {
          company: "Figma",
          url: "https://www.figma.com",
          category: "AI-inferred category pending",
          persona: "AI-assisted onboarding",
          notes: "SignalStack will infer category, positioning, and brand context from the confirmed brand and website in a future iteration.",
          competitors: ["Canva", "Adobe XD", "Sketch", "Framer"],
          authProvider: "Google",
          authEmail: "hello@figma.com",
        };

        function loadState() {
          try {
            return { ...defaultState, ...(JSON.parse(window.localStorage.getItem(STORAGE_KEY)) || {}) };
          } catch (error) {
            return { ...defaultState };
          }
        }

        function saveState(nextState) {
          window.localStorage.setItem(STORAGE_KEY, JSON.stringify(nextState));
        }

        function deriveCompanyName(emailDomain) {
          const rootDomain = emailDomain.split(".")[0] || "";
          if (!rootDomain) return "";
          return rootDomain.charAt(0).toUpperCase() + rootDomain.slice(1);
        }

        function isValidEmail(value) {
          return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value.trim());
        }

        const signupForm = document.getElementById("email-signup-form");
        const emailInput = document.getElementById("email-input");
        const continueButton = document.getElementById("email-continue");
        const googleTrigger = document.getElementById("google-oauth-trigger");
        const popupFeatures = "popup=yes,width=800,height=760,left=120,top=80,resizable=yes,scrollbars=yes";

        function refreshEmailState() {
          const valid = isValidEmail(emailInput.value);
          continueButton.disabled = !valid;
          continueButton.classList.toggle("is-ready", valid);
        }

        if (googleTrigger) {
          googleTrigger.addEventListener("click", function () {
            const state = loadState();
            saveState({
              ...state,
              company: "",
              url: "",
              competitors: [],
              authProvider: "Google",
              authEmail: "",
            });

            const popup = window.open("oauth-google.html", "signalstack-google-oauth", popupFeatures);
            if (!popup) {
              window.location.href = "oauth-google.html";
            }
          });
        }

        if (signupForm && emailInput && continueButton) {
          signupForm.addEventListener("submit", function (event) {
            event.preventDefault();

            if (!isValidEmail(emailInput.value)) {
              refreshEmailState();
              return;
            }

            const state = loadState();
            const email = emailInput.value.trim().toLowerCase();
            const emailDomain = email.split("@")[1] || "";

            saveState({
              ...state,
              company: deriveCompanyName(emailDomain) || state.company,
              url: emailDomain || state.url.replace(/^https?:\/\//i, ""),
              competitors: [],
              authProvider: "Email",
              authEmail: email,
            });

            window.location.href = signupForm.action;
          });

          emailInput.addEventListener("input", refreshEmailState);
          emailInput.addEventListener("blur", refreshEmailState);
          refreshEmailState();
        }

        const root = document.documentElement;
        const announcementBar = document.querySelector(".announcement-bar");

        if (!announcementBar) return;

        let ticking = false;
        let maxScroll = Math.max(announcementBar.offsetHeight, 1);

        const updateScrollState = () => {
          ticking = false;

          const scrollTop = window.scrollY || window.pageYOffset || 0;
          const progress = Math.min(scrollTop / maxScroll, 1);

          root.style.setProperty("--announcement-progress", progress.toFixed(3));
          document.body.classList.toggle("is-scrolled", progress > 0.02);
        };

        const requestUpdate = () => {
          if (ticking) return;
          ticking = true;
          window.requestAnimationFrame(updateScrollState);
        };

        const refreshMeasurements = () => {
          maxScroll = Math.max(announcementBar.offsetHeight, 1);
          requestUpdate();
        };

        window.addEventListener("scroll", requestUpdate, { passive: true });
        window.addEventListener("resize", refreshMeasurements);
        window.addEventListener("load", refreshMeasurements);

        refreshMeasurements();
      })();
    </script>
