<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignalStack | Building Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="home.css" />
  </head>
  <body>
    <div class="page">
      <div class="top-shell">
        <div class="main-nav">
          <div class="main-nav-container">
            <div class="main-nav-logo">
              <a href="homepage.html">
                <img src="img/logo.svg" alt="SignalStack logo" />
              </a>
            </div>
            <div class="main-nav-actions">
              <button class="button">Get started</button>
              <button class="button">Log in</button>
            </div>
          </div>
        </div>
      </div>

      <div class="main-content loading">
        <main class="loading-page fade-up">
          <section class="loading-shell">
            <div class="auth-copy">
              <p class="eyebrow">Final step</p>
              <h1 class="page-title">Building your dashboard</h1>
              <p class="lede">Pulling together a lightweight brand benchmark for <span data-company>your company</span>.</p>
            </div>

            <div class="confirmation-card">
              <div class="progress-shell">
                <div class="progress-track">
                  <span id="progress-bar"></span>
                </div>
                <div class="progress-meta">
                  <strong id="progress-text">Preparing your dashboard</strong>
                  <span id="progress-percent">0%</span>
                </div>
              </div>

              <div class="button-row">
                <a class="button" href="setup.html">Back</a>
                <a class="button primary is-hidden" id="view-results" href="results.html">See my dashboard</a>
              </div>
            </div>
          </section>
        </main>
      </div>

      <div class="footer">
        <p>© 2026 SignalStack. All rights reserved.</p>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
