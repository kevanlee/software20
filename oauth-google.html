<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignalStack | Google OAuth Mock</title>
    <link rel="stylesheet" href="home.css" />
  </head>
  <body>
    <button class="oauth-trigger" id="oauth-complete" type="button" aria-label="Complete mock Google OAuth">
      <img class="oauth-image" id="oauth-image" src="img/google-oauth.png" alt="Mock Google OAuth window" />
      <div class="oauth-fallback" id="oauth-fallback">
        <h1>Mock Google OAuth</h1>
        <p>
          If the image is unavailable, click below to continue the flow.
        </p>
        <span class="oauth-fallback-action">Continue to setup</span>
      </div>
    </button>

    <script>
      (function () {
        const STORAGE_KEY = "signalstack_benchmark";
        const defaultState = {
          company: "Figma",
          url: "https://www.figma.com",
          category: "AI-inferred category pending",
          persona: "AI-assisted onboarding",
          notes: "SignalStack will infer category, positioning, and brand context from the confirmed brand and website in a future iteration.",
          competitors: ["Canva", "Adobe XD", "Sketch", "Framer"],
          authProvider: "Google",
          authEmail: "hello@figma.com",
        };

        function loadState() {
          try {
            return { ...defaultState, ...(JSON.parse(window.localStorage.getItem(STORAGE_KEY)) || {}) };
          } catch (error) {
            return { ...defaultState };
          }
        }

        function saveState(nextState) {
          window.localStorage.setItem(STORAGE_KEY, JSON.stringify(nextState));
        }

        const image = document.getElementById("oauth-image");
        const fallback = document.getElementById("oauth-fallback");
        const completeButton = document.getElementById("oauth-complete");

        image.addEventListener("error", function () {
          image.style.display = "none";
          fallback.classList.add("is-visible");
        });

        completeButton.addEventListener("click", function () {
          const state = loadState();
          saveState({
            ...state,
            company: "Bonfire",
            url: "aroundthebonfire.com",
            competitors: [],
            authProvider: "Google",
            authEmail: "hello@aroundthebonfire.com",
          });

          if (window.opener && !window.opener.closed) {
            window.opener.location.href = "setup.html";
            window.close();
            return;
          }

          window.location.href = "setup.html";
        });
      })();
    </script>
  </body>
</html>
